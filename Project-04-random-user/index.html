<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevFinder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-blur"></div>

<div class="app">

<h1 class="logo">DevFinder</h1>

<div class="search-area">
<input id="usernameInput" placeholder="Search GitHub Developer...">
<button id="searchBtn">Search</button>
</div>

<p id="statusText"></p>

<div id="profileCard" class="profile-card">

<div class="profile-header">
<img id="userImg">
<div>
<h2 id="userName"></h2>
<p id="userBio"></p>
</div>
</div>

<div class="stats">
<div><h3 id="followers">0</h3><span>Followers</span></div>
<div><h3 id="following">0</h3><span>Following</span></div>
<div><h3 id="repos">0</h3><span>Repositories</span></div>
</div>

<a id="profileLink" target="_blank">Visit GitHub Profile →</a>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
